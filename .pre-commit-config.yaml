repos:
  # Regras básicas de limpeza de texto
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files # Impede comitar arquivos gigantes (ex: CSVs esquecidos)

  # Blindagem contra vazamento de credenciais (Senhas, chaves AWS, etc)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        exclude: .*/tests/.*

  # Formatador e Linter ultra-rápido (Ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      - id: ruff
        args: [ --fix ] # Conserta erros de importação automaticamente
      - id: ruff-format # Formata o código (equivalente ao Black)
